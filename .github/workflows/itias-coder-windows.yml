name: ITIAS Coder Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Build portable zip (Win7 SP1+ compatible)
        shell: pwsh
        run: ./packaging/build_windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ITIAS-Coder-win64
          path: dist/ITIAS-Coder-v0.1.2-win64-win7.zip
          retention-days: 30
